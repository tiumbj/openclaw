# Production Configuration - OracleBot Pro
# Environment: production

# MT5 Connection Settings
mt5:
  server: "MetaQuotes-Demo"
  login: ${MT5_LOGIN:123456}
  password: ${MT5_PASSWORD:demo_password}
  timeout: 30
  max_retries: 5
  heartbeat_interval: 30

# Trading Parameters
trading:
  default_symbol: "XAUUSD"
  max_position_size: 0.1
  max_daily_trades: 10
  risk_per_trade: 0.02  # 2% of account per trade
  slippage: 2.0

# OpenClaw AI Integration (จะอัพเดทเมื่อติดตั้งเสร็จ)
openclaw:
  enabled: false
  api_url: "http://openclaw-core:8000"
  timeout: 30
  retry_attempts: 3

# Telegram Notifications
telegram:
  enabled: true
  bot_token: ${TELEGRAM_BOT_TOKEN:}
  chat_id: ${TELEGRAM_CHAT_ID:}
  alert_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# Monitoring & Logging
monitoring:
  log_level: "INFO"
  metrics_enabled: true
  health_check_interval: 60

# Resilience Settings
resilience:
  circuit_breaker_threshold: 5
  retry_backoff_factor: 2
  max_retry_delay: 60

# Strategy Configuration
strategies:
  xauusd:
    enabled: true
    timeframe: "M15"
    indicators:
      rsi_period: 14
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9