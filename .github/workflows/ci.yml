name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_mt5_integration:
        description: "Run MT5 integration tests (requires MT5 + credentials on runner)."
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Ruff (gate)
        run: python -m ruff check . --select F,E9

      - name: Compileall (syntax)
        run: python -m compileall -q .

  style_debt:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black isort

      - name: Ruff (full)
        run: python -m ruff check .

      - name: Black
        run: python -m black --check .

      - name: Isort
        run: python -m isort --check-only .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit semgrep

      - name: Pip-audit
        run: python -m pip_audit

      - name: Bandit
        run: python -m bandit -q -r .

      - name: Semgrep
        run: semgrep scan --config auto --error

  mt5_integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mt5_integration == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run MT5 integration tests
        env:
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
        run: |
          python -m pytest -q
